name: CI
on:
  push:
    branches: [main]
  pull_request:
jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - run: go build ./...
      - run: go vet ./...
      - run: go test -race -shuffle=on -count=1 -timeout 5m ./...
      - uses: golangci/golangci-lint-action@v6
        continue-on-error: true
        with:
          version: latest
